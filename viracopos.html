<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patota Vira Copo's</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #000; color: #fff; }
        header { display: flex; justify-content: center; align-items: center; position: relative; padding: 15px 20px 5px 20px; }
        h1 { margin: 0; font-size: 20px; font-weight: bold; }
        #menu { position: absolute; right: 20px; font-size: 22px; cursor: pointer; }
        #horaAtual { text-align: center; font-size: 12px; opacity: 0.7; margin-top: 4px; }
        #cronometro { text-align: center; font-size: 20px; margin-top: 4px; }
        #cardPlacar { margin: 20px; background: #111; border-radius: 16px; padding: 30px 0; text-align: center; }
        #placar { font-size: 64px; font-weight: bold; }
        #placar span { display: inline-block; min-width: 70px; }
        #controle { display: block; width: 90%; margin: 10px auto 20px auto; padding: 16px; font-size: 18px; font-weight: bold; background: #2d8cf0; border: none; border-radius: 12px; color: #fff; }
        .divisor { height: 1px; background: #222; margin: 15px 20px; }
        .tituloTime { text-align: center; font-weight: bold; margin-bottom: 10px; }
        .amareloTitulo { color: #ffd600; }
        .azulTitulo { color: #00c8ff; }
        .botao { display: block; width: 90%; margin: 10px auto; padding: 18px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; }
        .gol { background: #00c853; color: #000; }
        .lance { background: #ff9800; color: #000; }
        .falta { background: #ff3b30; color: #fff; }
        #menuBox { display: none; position: absolute; right: 20px; top: 55px; background: #111; border: 1px solid #333; border-radius: 8px; padding: 8px; z-index: 100; }
        #menuBox button { display: block; width: 100%; background: #222; color: #fff; border: none; padding: 10px; margin: 4px 0; border-radius: 4px; text-align: left; }
    </style>
</head>
<body>

<header>
    <h1>Patota Vira Copo's</h1>
    <div id="menu">⋮</div>
</header>

<div id="horaAtual"></div>
<div id="cronometro">00:00:00</div>

<div id="cardPlacar">
    <div id="placar">
        <span id="a" style="color:#ffd600;">0</span>
        <span style="font-size:30px;opacity:0.6;">x</span>
        <span id="b" style="color:#00c8ff;">0</span>
    </div>
</div>

<button id="controle" onclick="toggle()">INICIAR JOGO</button>

<div class="divisor"></div>

<div class="tituloTime amareloTitulo">🟡 TIME AMARELO</div>
<button class="botao gol" onclick="gol('Amarelo')">GOL</button>
<button class="botao lance" onclick="evento('Lance','Amarelo')">LANCE</button>
<button class="botao falta" onclick="evento('Falta','Amarelo')">FALTA</button>

<div class="divisor"></div>

<div class="tituloTime azulTitulo">🔵 TIME AZUL</div>
<button class="botao gol" onclick="gol('Azul')">GOL</button>
<button class="botao lance" onclick="evento('Lance','Azul')">LANCE</button>
<button class="botao falta" onclick="evento('Falta','Azul')">FALTA</button>

<div id="menuBox">
    <button onclick="enviarWhatsApp()">Enviar WhatsApp 🟢</button>
    <button onclick="voltarGol()">Anular Último Gol</button>
</div>

<script>
let amarelo = 0, azul = 0;
let jogando = false;
let inicio = null;
let relatorio = [];
let ultimoGol = null;
let timer;
let wakeLock = null;

// Mantém a tela ligada
async function solicitarWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
            console.log('Tela sempre ativa!');
        }
    } catch (err) {
        console.error(`${err.name}, ${err.message}`);
    }
}

// Libera a tela para apagar normalmente
function liberarWakeLock() {
    if (wakeLock !== null) {
        wakeLock.release();
        wakeLock = null;
        console.log('Bloqueio de tela removido.');
    }
}

function atualizarHora() {
    document.getElementById("horaAtual").innerText = new Date().toLocaleTimeString();
}
setInterval(atualizarHora, 1000);
atualizarHora();

document.getElementById("menu").onclick = function() {
    let box = document.getElementById("menuBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

function atualizarPlacar() {
    document.getElementById("a").innerText = amarelo;
    document.getElementById("b").innerText = azul;
}

function agora() { return new Date().toLocaleTimeString(); }

function getNomeTimeColorido(time) {
    return time === "Amarelo" ? "🟡 AMARELO" : "🔵 AZUL";
}

function gol(time) {
    if (!jogando) { alert("Inicie o jogo primeiro!"); return; }
    navigator.vibrate(200);
    if (time == "Amarelo") { amarelo++; ultimoGol = "Amarelo"; } 
    else { azul++; ultimoGol = "Azul"; }
    atualizarPlacar();
    relatorio.push("⚽ [" + agora() + "] GOL - " + getNomeTimeColorido(time) + " (" + amarelo + " x " + azul + ")");
}

function evento(tipo, time) {
    if (!jogando) { alert("Inicie o jogo primeiro!"); return; }
    navigator.vibrate(100);
    let emoji = (tipo === 'Falta') ? "🟥" : "🎯";
    relatorio.push(emoji + " [" + agora() + "] " + tipo + " - " + getNomeTimeColorido(time));
}

function voltarGol() {
    if (!ultimoGol) return;
    let timeAnulado = ultimoGol;
    if (ultimoGol == "Amarelo" && amarelo > 0) amarelo--;
    if (ultimoGol == "Azul" && azul > 0) azul--;
    atualizarPlacar();
    relatorio.push("❌ [" + agora() + "] GOL ANULADO - " + getNomeTimeColorido(timeAnulado) + " (" + amarelo + " x " + azul + ")");
    ultimoGol = null;
    document.getElementById("menuBox").style.display = "none";
}

function toggle() {
    if (!jogando) {
        solicitarWakeLock(); // Ativa tela sempre ligada
        inicio = new Date();
        relatorio = [];
        amarelo = 0; azul = 0; 
        atualizarPlacar();
        document.getElementById("cronometro").innerText = "00:00:00";
        
        relatorio.push("==========================");
        relatorio.push("   PATOTA VIRA COPO'S");
        relatorio.push("==========================");
        relatorio.push("DATA: " + inicio.toLocaleDateString());
        relatorio.push("INÍCIO: " + inicio.toLocaleTimeString());
        relatorio.push("--------------------------");
        
        document.getElementById("controle").innerText = "FINALIZAR JOGO";
        document.getElementById("controle").style.background = "#ff3b30";
        timer = setInterval(crono, 1000);
        jogando = true;
    } else {
        liberarWakeLock(); // Libera a tela
        let fim = new Date();
        clearInterval(timer);
        
        relatorio.push("--------------------------");
        relatorio.push("FIM: " + fim.toLocaleTimeString());
        relatorio.push("RESULTADO: 🟡 " + amarelo + " x " + azul + " 🔵");
        
        let vencedor = "EMPATE";
        if (amarelo > azul) vencedor = "🟡 AMARELO 🏆";
        else if (azul > amarelo) vencedor = "🔵 AZUL 🏆";
        relatorio.push("VENCEDOR: " + vencedor);
        relatorio.push("==========================");
        
        document.getElementById("controle").innerText = "INICIAR NOVO JOGO";
        document.getElementById("controle").style.background = "#2d8cf0";
        document.getElementById("cronometro").innerText = "00:00:00";
        amarelo = 0; azul = 0;
        atualizarPlacar();
        
        jogando = false;
        alert("Jogo finalizado! Envie o relatório pelo menu.");
    }
}

function crono() {
    let agora = new Date();
    let diff = new Date(agora - inicio);
    let h = String(diff.getUTCHours()).padStart(2, '0');
    let m = String(diff.getUTCMinutes()).padStart(2, '0');
    let s = String(diff.getUTCSeconds()).padStart(2, '0');
    document.getElementById("cronometro").innerText = h + ":" + m + ":" + s;
}

function enviarWhatsApp() {
    if (relatorio.length === 0) {
        alert("Não há dados de jogo para enviar!");
        return;
    }
    const textoRelatorio = relatorio.join("\n");
    const mensagem = encodeURIComponent(textoRelatorio);
    const url = "https://wa.me/?text=" + mensagem;
    window.open(url, "_blank");
    document.getElementById("menuBox").style.display = "none";
}

// Garante que o bloqueio volte caso o usuário saia e volte para a aba do navegador
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') {
    solicitarWakeLock();
  }
});

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
